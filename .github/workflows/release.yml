name: Release Windows app

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare native dependency for Node tests
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm test -- --run

      - name: Check types
        run: npm run typecheck

      - name: Build release files
        run: npm run dist -- --publish never

      - name: Publish complete GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release/competitor-content-radar-setup-*.exe
            release/competitor-content-radar-setup-*.exe.blockmap
            release/latest.yml
