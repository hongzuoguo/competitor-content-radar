name: Release optional Scrapling engine

on:
  push:
    tags: ['scrapling-engine-v1']
  workflow_dispatch:
    inputs:
      version:
        description: Component version
        required: true
        default: 0.1.2

permissions:
  contents: write

jobs:
  release-engine:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: engine/scrapling/requirements.txt

      - name: Build and test engine
        shell: pwsh
        run: ./engine/scrapling/build.ps1

      - name: Generate signed manifest data
        shell: pwsh
        run: |
          $archive = Get-Item ./engine/scrapling/dist/scrapling-engine-win32-x64.zip
          $hash = (Get-FileHash $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $componentVersion = '${{ inputs.version || '0.1.2' }}'
          $manifest = [ordered]@{
            protocolVersion = 1
            version = $componentVersion
            platform = 'win32'
            arch = 'x64'
            url = "https://github.com/${{ github.repository }}/releases/download/scrapling-engine-v1/scrapling-engine-win32-x64.zip?version=$componentVersion"
            sha256 = $hash
            size = $archive.Length
          }
          $manifest | ConvertTo-Json | Set-Content -Encoding utf8 ./engine/scrapling/dist/scrapling-engine-manifest.json

      - name: Publish component channel assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: scrapling-engine-v1
          name: Scrapling engine protocol v1
          body: Optional local collection engine for Competitor Content Radar. Installed on demand by the desktop app.
          draft: false
          prerelease: false
          make_latest: false
          files: |
            engine/scrapling/dist/scrapling-engine-win32-x64.zip
            engine/scrapling/dist/scrapling-engine-manifest.json
